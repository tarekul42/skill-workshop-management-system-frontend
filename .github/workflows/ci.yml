name: Frontend CI

on:
  push:
    branches: [ master, main, "feat/**" ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Run Unit Tests
        run: bun run test run

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:5000/api/v1' }}

      # Optional: Run E2E tests in CI (commented out by default to save minutes)
      # - name: Install Playwright Browsers
      #   run: bunx playwright install --with-deps
      # - name: Run E2E Tests
      #   run: bun run test:e2e
